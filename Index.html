<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Twarzy Grzybiarzy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="./images/steam/sits_01.png" alt="Log in with Steam" class="steam-logo">
    </header>

    <main>
        <div class="tile" id="live">
            <div class="wide_tile" id="steam"><p>Steam</p></div>
            <div class="small_tile" id="twitch"><p>Twitch</p></div>
            <div class="small_tile" id="youtube"><p>YouTube</p></div>
            <div class="small_tile" id="kick"><p>Kick</p></div>
        </div>
        <div class="tile" id="stats">
                <div class="wide_tile" id="player-stats"><p>Player Stats</p></div>
                <div class="small_tile" id="game-stats"><p>Game Stats</p></div>
        </div>
        <div class="tile" id="tutorials">
                <div class="wide_tile" id="beginner"><p>Beginner's Guide</p></div>
                <div class="small_tile" id="advanced"><p>Advanced Tips</p></div>
        </div>
    </main>

    <script src="script.js"></script>

    <footer>
        <span class="about us">100 Twarzy Grzybiarzy</span>
    </footer>
</body>
</html>
